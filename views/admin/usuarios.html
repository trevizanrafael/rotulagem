<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Usuários - Admin</title>
</head>
<body>
  <div style="display: flex;">

    <!-- Menu lateral -->
    <nav>
      <ul>
        <li><a href="/admin/usuarios">Usuários</a></li>
      </ul>
    </nav>

    <!-- Conteúdo principal -->
    <main>
      <h1>Cadastro de Usuários</h1>

      <form action="/admin/usuarios" method="POST">
        <div>
          <label for="username">Usuário:</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div>
          <label for="password">Senha:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Cadastrar</button>
      </form>

      <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('success') === 'usuario_criado') {
          const p = document.createElement('p');
          p.textContent = 'Usuário cadastrado com sucesso!';
          document.querySelector('main').appendChild(p);
        }
        if (params.get('error') === 'usuario_ja_existe') {
          const p = document.createElement('p');
          p.textContent = 'Erro: esse nome de usuário já existe.';
          document.querySelector('main').appendChild(p);
        }
        if (params.get('error') === 'erro_interno') {
          const p = document.createElement('p');
          p.textContent = 'Erro interno. Tente novamente.';
          document.querySelector('main').appendChild(p);
        }
      </script>

      <br>
      <a href="/admin/dashboard">← Voltar ao painel</a>

      <form action="/admin/logout" method="POST" style="margin-top: 1rem;">
        <button type="submit">Sair</button>
      </form>
    </main>

  </div>
</body>
</html>
